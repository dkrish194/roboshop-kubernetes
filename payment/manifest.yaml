apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---

apiVersion: apps/v1
kind: Deployment
metadata: 
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      teir: db
      component: payment
  template:
    metadata:
      name: payment
      labels:
        project: roboshop
        teir: db
        component: payment
    spec:
      containers:
        - name: payment
          image: dkrish194/payment:2.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
          envFrom:
            - configMapRef:
                name: payment
            
            

---
apiVersion: v1
kind: Service
metadata:
  name: payment
  labels:
      project: roboshop
      teir: db
      component: payment
spec:
  type: ClusterIP
  selector:
    project: roboshop
    teir: db
    component: payment
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
            