apiVersion: apps/v1
kind: Deployment
metadata: 
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: redis
spec:
  replicas: 1
  selector:
    project: roboshop
    teir: db
    component: redis
  template:
    metadata:
      name: redis
      labels:
        project: roboshop
        teir: db
        component: redis
    spec:
      containers:
        - name: redis
          image: dkrish194/redis:2.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
      project: roboshop
      teir: db
      component: redis
spec:
  type: ClusterIP
  selector:
    project: roboshop
    teir: db
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
            