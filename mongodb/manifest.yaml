apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    project: roboshop
    teir: db
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      teir: db
      component: mongodb
  template:
    metadata:
      name: podname
      labels:
        project: roboshop
        teir: db
        component: mongodb
    spec:
      containers:
        - name: mongodb
          image: dkrish194/mongodb:1.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
      project: roboshop
      teir: db
      component: mongodb
spec:
  selector:
    project: roboshop
    teir: db
    component: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  

      

    
    