apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: cluster-krishna
  region: us-east-1

managedNodeGroups:
  - name: spot
    instanceTypes:
      - t3.medium
      - t3a.medium
      - c5.large
      - c5a.large
    spot: true
    minSize: 1
    maxSize: 3
    desiredCapacity: 2