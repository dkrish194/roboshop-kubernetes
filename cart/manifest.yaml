apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
data:
  REDIS_HOST: "redis"
  RCATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
  
---

apiVersion: apps/v1
kind: Deployment
metadata: 
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: cart
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      teir: db
      component: cart
  template:
    metadata:
      name: cart
      labels:
        project: roboshop
        teir: db
        component: cart
    spec:
      containers:
        - name: cart
          image: dkrish194/cart:2.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
          envFrom:
            - configMapRef:
                name: cart
            
            

---
apiVersion: v1
kind: Service
metadata:
  name: cart
  labels:
      project: roboshop
      teir: db
      component: cart
spec:
  type: ClusterIP
  selector:
    project: roboshop
    teir: db
    component: cart
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
            