apiVersion: v1
kind: ConfigMap
metadata:
  name: user
data:
  MONGO: "true"
  REDIS_URL: 'redis://redis:6379'
  MONGO_URL: "mongodb://mongo:27017/users"
  
---

apiVersion: apps/v1
kind: Deployment
metadata: 
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: user
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      teir: db
      component: user
  template:
    metadata:
      name: user
      labels:
        project: roboshop
        teir: db
        component: user
    spec:
      containers:
        - name: user
          image: dkrish194/user:2.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
          envFrom:
            - configMapRef:
                name: user
            
            

---
apiVersion: v1
kind: Service
metadata:
  name: user
  labels:
      project: roboshop
      teir: db
      component: user
spec:
  type: ClusterIP
  selector:
    project: roboshop
    teir: db
    component: user
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
            