apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: rabbitmq
spec:
  selector:
    matchLabels:
      project: roboshop
      teir: db
      component: rabbitmq
  template:
    metadata:
      labels:
        project: roboshop
        teir: db
        component: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: dkrish194/rabbitmq:3.0.0
        resources:
          limits:
            memory: "300Mi"
            cpu: "200m"
          requests:
            cpu: "200m"
            memory: "250Mi"
        ports:
        - containerPort: 5672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: rabbitmq
spec:
  selector:
    project: roboshop
    teir: db
    component: rabbitmq
  ports:
  - port: 5672
    targetPort: 5672
    protocol: TCP

