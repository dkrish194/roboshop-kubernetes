apiVersion: apps/v1
kind: Deployment
metadata: 
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    teir: db
    component: rabbitmq
spec:
  replicas: 1
  selector:
    project: roboshop
    teir: db
    component: rabbitmq
  template:
    metadata:
      name: rabbitmq
      labels:
        project: roboshop
        teir: db
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: dkrish194/rabbitmq:2.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
      project: roboshop
      teir: db
      component: rabbitmq
spec:
  type: ClusterIP
  selector:
    project: roboshop
    teir: db
    component: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
            